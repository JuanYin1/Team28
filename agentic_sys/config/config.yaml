version: 2

evaluation:
  shared:
    scoring_version: v2
    runs_per_task: 1
    include_runtime_extension_suite: false
    minimum_high_supervision_coverage: 0.40
    main_leaderboard_core_suite_only: true
  v2:
    evidence_quality:
      include_in_total_score: false
      provisional_if_below_high_supervision_coverage: 0.40
    comparability:
      hard_requirements:
        checker_must_run: true
      soft_requirements:
        structured_trace_preferred: true
    normalization:
      mode: task_family_baseline
      baseline_by_task_type:
        file_ops:
          latency_seconds: 45.0
          cost_usd: 0.10
          steps: 8
          memory_mb: 256
        coding:
          latency_seconds: 90.0
          cost_usd: 0.20
          steps: 12
          memory_mb: 384
        analysis:
          latency_seconds: 120.0
          cost_usd: 0.25
          steps: 15
          memory_mb: 512
        reasoning:
          latency_seconds: 80.0
          cost_usd: 0.12
          steps: 10
          memory_mb: 256
        skills:
          latency_seconds: 90.0
          cost_usd: 0.20
          steps: 10
          memory_mb: 384
    gate_caps:
      safety: 0.20
      critical: 0.45
      oracle: 0.60

agents:
  mini-agent:
    aliases: [mini]
    scripts:
      phase1:
        results_dir: artifacts/mini-agent/phase1
      phase2:
        results_dir: artifacts/mini-agent/phase2
      phase3:
        results_dir: artifacts/mini-agent/phase3
      run_single_test:
        results_dir: artifacts/mini-agent/phase3/single_test
    adapter:
      type: mini-agent
      executable:
      conda_env:
      extra_args: []

  continue:
    aliases: [continue-cn, cn]
    scripts:
      phase1:
        results_dir: artifacts/continue/phase1
      phase2:
        results_dir: artifacts/continue/phase2
      phase3:
        results_dir: artifacts/continue/phase3
      run_single_test:
        results_dir: artifacts/continue/phase3/single_test
    adapter:
      type: continue-cn
      executable:
      agent_name:
      config_path: continuedev/default-cli-config
      model_slugs:
        - anthropic/claude-haiku-4-5
      allow_policies: []
      extra_args:
        - --org
        - zhiruis-workspace-2
        - --auto

  mini-swe-agent:
    aliases: [mini-swe, mswe]
    scripts:
      phase1:
        results_dir: artifacts/mini-swe-agent/phase1
      phase2:
        results_dir: artifacts/mini-swe-agent/phase2
      phase3:
        results_dir: artifacts/mini-swe-agent/phase3
      run_single_test:
        results_dir: artifacts/mini-swe-agent/phase3/single_test
    adapter:
      type: mini-swe-agent
      executable: mini
      model_name: openai/gpt-5
      config_specs: []
      yolo: true
      exit_immediately: true
      output_filename: mini_swe_run.traj.json
      extra_args: []

  # Example: add a new agent with YAML only (no adapter/registry code changes).
  example-generic:
    aliases: [example]
    scripts:
      phase1:
        results_dir: artifacts/example-generic/phase1
      phase2:
        results_dir: artifacts/example-generic/phase2
      phase3:
        results_dir: artifacts/example-generic/phase3
      run_single_test:
        results_dir: artifacts/example-generic/phase3/single_test
    adapter:
      type: generic-cli
      agent_id: example-generic
      process_name_hint: example-agent
      command:
        - example-agent
        - --workspace
        - "{workspace}"
        - --task
        - "{task_prompt}"
      extra_args: []
      env: {}
      cwd: "{workspace}"
      success_codes: [0]
