version: 2

agents:
  mini-agent:
    aliases: [mini]
    scripts:
      phase1:
        results_dir: artifacts/mini-agent/phase1
      phase2:
        results_dir: artifacts/mini-agent/phase2
      phase3:
        results_dir: artifacts/mini-agent/phase3
      run_single_test:
        results_dir: artifacts/mini-agent/phase3/single_test
    adapter:
      type: mini-agent
      executable:
      conda_env:
      extra_args: []

  continue:
    aliases: [continue-cn, cn]
    scripts:
      phase1:
        results_dir: artifacts/continue/phase1
      phase2:
        results_dir: artifacts/continue/phase2
      phase3:
        results_dir: artifacts/continue/phase3
      run_single_test:
        results_dir: artifacts/continue/phase3/single_test
    adapter:
      type: continue-cn
      executable:
      agent_name:
      config_path: continuedev/default-cli-config
      model_slugs:
        - anthropic/claude-haiku-4-5
      allow_policies: []
      extra_args:
        - --org
        - zhiruis-workspace-2
        - --auto

  # Example: add a new agent with YAML only (no adapter/registry code changes).
  example-generic:
    aliases: [example]
    scripts:
      phase1:
        results_dir: artifacts/example-generic/phase1
      phase2:
        results_dir: artifacts/example-generic/phase2
      phase3:
        results_dir: artifacts/example-generic/phase3
      run_single_test:
        results_dir: artifacts/example-generic/phase3/single_test
    adapter:
      type: generic-cli
      agent_id: example-generic
      process_name_hint: example-agent
      command:
        - example-agent
        - --workspace
        - "{workspace}"
        - --task
        - "{task_prompt}"
      extra_args: []
      env: {}
      cwd: "{workspace}"
      success_codes: [0]
